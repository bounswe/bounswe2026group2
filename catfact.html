<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Facts</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 600px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 48px 40px;
      text-align: center;
    }
    .card h1 {
      font-size: 2rem;
      color: #92400e;
      margin-bottom: 8px;
    }
    .card .emoji {
      font-size: 4rem;
      margin-bottom: 16px;
    }
    .card .description {
      color: #78716c;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .fact-box {
      background: #fef3c7;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fact-text {
      font-size: 1.1rem;
      color: #451a03;
      line-height: 1.6;
    }
    .loading {
      color: #92400e;
    }
    .error {
      color: #dc2626;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      margin: 8px;
      transition: all 150ms;
    }
    .btn-primary {
      background-color: #f59e0b;
      color: white;
    }
    .btn-primary:hover {
      background-color: #d97706;
    }
    .btn-secondary {
      background-color: #e5e7eb;
      color: #374151;
    }
    .btn-secondary:hover {
      background-color: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🐱</div>
    <h1>Cat Facts</h1>
    <p class="description">
      This page fetches random cat facts from the <strong>Cat Facts API</strong> 
      (catfact.ninja). Each fact is a fun, educational piece of trivia about cats!
    </p>
    <div class="fact-box">
      <p id="fact" class="fact-text loading">Loading a cat fact...</p>
    </div>
    <div>
      <button class="btn btn-primary" onclick="fetchCatFact()">Get Another Fact</button>
      <button class="btn btn-secondary" onclick="window.location.href='index.html'">Back to Home</button>
    </div>
  </div>

  <script>
    async function fetchCatFact() {
      const factElement = document.getElementById('fact');
      factElement.textContent = 'Loading a cat fact...';
      factElement.className = 'fact-text loading';

      try {
        const response = await fetch('https://catfact.ninja/fact');
        const data = await response.json();
        factElement.textContent = data.fact;
        factElement.className = 'fact-text';
      } catch (error) {
        factElement.textContent = 'Failed to fetch cat fact. Please try again.';
        factElement.className = 'fact-text error';
      }
    }

    // Fetch on page load
    fetchCatFact();
  </script>
</body>
</html>

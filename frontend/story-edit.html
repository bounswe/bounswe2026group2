<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local History Map - Edit Story</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: "#fef9f0",
            surface: "#ffffff",
            primary: "#775a19",
            "primary-light": "#c5a059",
            secondary: "#506169",
            tertiary: "#35618f",
            border: "#e7e2d9",
            textmain: "#1d1c16",
            textmuted: "#5f584c"
          },
          fontFamily: {
            body: ["Inter", "sans-serif"],
            headline: ["Noto Serif", "serif"]
          },
          boxShadow: {
            soft: "0 20px 50px rgba(0,0,0,0.08)"
          }
        }
      }
    };
  </script>
  <style>
    #location-search-container { position: relative; z-index: 1000; }
    #edit-map { position: relative; z-index: 0; }
    .leaflet-container { font-family: "Inter", sans-serif; }
    .leaflet-control-zoom a {
      background: rgba(254,249,240,0.9) !important;
      backdrop-filter: blur(12px);
      color: #775a19 !important;
      border: 1px solid #e7e2d9 !important;
      font-weight: 600;
    }
    .leaflet-control-zoom a:hover { background: #ffffff !important; }
    .leaflet-control-attribution { background: rgba(254,249,240,0.75) !important; font-size: 10px; }
    #location-search-results { max-height: 200px; overflow-y: auto; }
    #location-search-results::-webkit-scrollbar { width: 4px; }
    #location-search-results::-webkit-scrollbar-thumb { background: #c5a059; border-radius: 4px; }
  </style>
</head>
<body class="bg-background text-textmain font-body min-h-screen">
<main class="w-full px-4 py-10 lg:px-8 xl:px-10 2xl:px-14">

  <header class="mb-10">
    <a id="back-link" href="map.html" class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:underline">
      <span aria-hidden="true">&larr;</span> Back to Story
    </a>
    <h1 class="mt-5 font-headline text-4xl font-extrabold leading-tight text-textmain">Edit your story</h1>
    <p id="story-subtitle" class="mt-4 max-w-4xl text-base leading-7 text-textmuted">Loading story...</p>
  </header>

  <div id="load-error" class="hidden mb-6 rounded-xl bg-red-50 border border-red-200 p-4 text-sm text-red-700">
    Failed to load story. <a id="back-link-error" href="map.html" class="font-semibold underline">Go back</a>.
  </div>

  <form id="story-form" class="hidden rounded-3xl border border-border bg-surface p-8 shadow-soft">
    <div class="space-y-6">

      <div>
        <label for="title" class="mb-2 block text-sm font-semibold text-textmain">Title</label>
        <input id="title" type="text" placeholder="Give your story a title" required
          class="w-full rounded-xl border-border bg-white px-4 py-3 text-sm focus:border-primary focus:ring-primary" />
      </div>

      <div>
        <label for="story" class="mb-2 block text-sm font-semibold text-textmain">Your Story</label>
        <textarea id="story" rows="7" placeholder="Write what happened here, who was involved, and why this place matters." required
          class="w-full rounded-xl border-border bg-white px-4 py-3 text-sm leading-6 focus:border-primary focus:ring-primary"></textarea>
      </div>

      <div>
        <label class="mb-2 block text-sm font-semibold text-textmain">Tags <span class="font-normal text-textmuted">(optional)</span></label>
        <p class="mb-2 text-xs text-textmuted">Add up to 10 tags to help others find your story. Press Enter or comma to confirm each tag.</p>
        <div id="tag-input-container"></div>
      </div>

      <section>
        <div>
          <h2 class="font-headline text-3xl font-bold text-textmain">Location</h2>
          <p class="mt-3 max-w-3xl text-sm leading-7 text-textmuted">
            Search for an address or click directly on the map to update the story's location.
          </p>
        </div>

        <div class="mt-4 relative" id="location-search-container">
          <input id="location-search" type="text" placeholder="Search for an address (e.g. Boğaziçi Üniversitesi)"
            autocomplete="off"
            class="w-full rounded-xl border-border bg-white px-4 py-3 text-sm focus:border-primary focus:ring-primary" />
          <div id="location-search-results"
            class="absolute top-full left-0 right-0 mt-1 bg-white border border-border rounded-xl shadow-soft overflow-hidden hidden z-50"></div>
        </div>

        <div class="mt-4 -mx-8 h-[360px] overflow-hidden border-y border-border/50 sm:mx-0 sm:h-[400px] sm:rounded-[1.75rem] sm:border">
          <div id="edit-map" style="height: 100%; width: 100%;"></div>
        </div>

        <div id="selected-location" class="mt-3 hidden">
          <div class="flex items-center gap-2 rounded-xl bg-[rgba(53,97,143,0.08)] px-4 py-3 text-sm">
            <span class="text-tertiary font-semibold">📍 Pinned:</span>
            <span id="selected-location-text" class="text-textmain"></span>
            <button type="button" id="clear-location" class="ml-auto text-xs text-red-500 hover:underline">Clear</button>
          </div>
        </div>

        <input type="hidden" id="latitude" name="latitude" />
        <input type="hidden" id="longitude" name="longitude" />
      </section>

      <div class="grid gap-6 md:grid-cols-2">
        <div>
          <label for="location" class="mb-2 block text-sm font-semibold text-textmain">Location Name</label>
          <input id="location" type="text" placeholder="Kadikoy, Istanbul"
            class="w-full rounded-xl border-border bg-white px-4 py-3 text-sm focus:border-primary focus:ring-primary" />
        </div>
        <div id="date-single-wrapper">
          <label for="date-single" class="mb-2 block text-sm font-semibold text-textmain">Date</label>
          <input id="date-single" type="text" inputmode="numeric" placeholder="mm/dd/yyyy"
            class="w-full rounded-xl border-border bg-white px-4 py-3 text-sm focus:border-primary focus:ring-primary" />
        </div>
      </div>

      <div>
        <label class="flex items-center gap-3 cursor-pointer">
          <input id="date-range-toggle" type="checkbox" class="rounded border-border text-primary focus:ring-primary" />
          <span class="text-sm text-textmuted">Specify a date range</span>
        </label>
        <div id="date-range-fields" class="mt-3 hidden grid gap-4 md:grid-cols-2">
          <div>
            <label for="date-start" class="mb-2 block text-sm font-semibold text-textmain">Start Date</label>
            <input id="date-start" type="text" inputmode="numeric" placeholder="mm/dd/yyyy"
              class="w-full rounded-xl border-border bg-white px-4 py-3 text-sm focus:border-primary focus:ring-primary" />
          </div>
          <div>
            <label for="date-end" class="mb-2 block text-sm font-semibold text-textmain">End Date</label>
            <input id="date-end" type="text" inputmode="numeric" placeholder="mm/dd/yyyy"
              class="w-full rounded-xl border-border bg-white px-4 py-3 text-sm focus:border-primary focus:ring-primary" />
          </div>
        </div>
      </div>

      <div id="form-error" class="hidden rounded-xl bg-red-50 border border-red-200 p-3 text-sm text-red-700"></div>
      <div id="form-success" class="hidden rounded-xl bg-green-50 border border-green-200 p-3 text-sm text-green-700"></div>

      <div class="flex gap-4">
        <button type="submit" id="btn-save"
          class="rounded-xl bg-primary px-5 py-3 text-sm font-semibold text-white transition hover:opacity-95">
          Save Changes
        </button>
        <a id="btn-cancel" href="map.html"
          class="inline-flex items-center justify-center rounded-xl border border-border bg-white px-5 py-3 text-sm font-semibold text-textmain transition hover:bg-stone-50">
          Cancel
        </a>
      </div>

    </div>
  </form>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="tags.js"></script>
<script>
  if (!requireAuth()) throw new Error("redirect");

  var urlParams = new URLSearchParams(window.location.search);
  var storyId = urlParams.get("id");

  var backUrl = storyId ? "story-detail.html?id=" + encodeURIComponent(storyId) : "map.html";
  document.getElementById("back-link").href = backUrl;
  document.getElementById("btn-cancel").href = backUrl;
  document.getElementById("back-link-error").href = backUrl;

  var tagInput = typeof createTagInput === "function"
    ? createTagInput(document.getElementById("tag-input-container"), { apiBase: API_BASE })
    : null;

  // ─── Map Init ───
  var editMap = L.map("edit-map", { center: [41.015, 28.979], zoom: 12 });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(editMap);

  var pinMarker = null;

  function setPin(lat, lng, label) {
    if (pinMarker) editMap.removeLayer(pinMarker);
    pinMarker = L.marker([lat, lng], { draggable: true }).addTo(editMap);
    pinMarker.on("dragend", function() {
      var pos = pinMarker.getLatLng();
      document.getElementById("latitude").value = pos.lat.toFixed(6);
      document.getElementById("longitude").value = pos.lng.toFixed(6);
      document.getElementById("selected-location-text").textContent = pos.lat.toFixed(4) + ", " + pos.lng.toFixed(4);
      reverseGeocode(pos.lat, pos.lng);
    });
    document.getElementById("latitude").value = lat.toFixed(6);
    document.getElementById("longitude").value = lng.toFixed(6);
    document.getElementById("selected-location-text").textContent = label || (lat.toFixed(4) + ", " + lng.toFixed(4));
    document.getElementById("selected-location").classList.remove("hidden");
  }

  editMap.on("click", function(e) {
    setPin(e.latlng.lat, e.latlng.lng, null);
    reverseGeocode(e.latlng.lat, e.latlng.lng);
  });

  document.getElementById("clear-location").addEventListener("click", function() {
    if (pinMarker) editMap.removeLayer(pinMarker);
    pinMarker = null;
    document.getElementById("latitude").value = "";
    document.getElementById("longitude").value = "";
    document.getElementById("location").value = "";
    document.getElementById("selected-location").classList.add("hidden");
  });

  function reverseGeocode(lat, lng) {
    fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lng + "&zoom=16")
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.display_name) {
          var shortName = data.display_name.split(",").slice(0, 3).join(",").trim();
          var locationName = data.display_name.split(",").slice(0, 2).join(",").trim();
          document.getElementById("location").value = locationName;
          document.getElementById("selected-location-text").textContent = shortName + " (" + lat.toFixed(4) + ", " + lng.toFixed(4) + ")";
        }
      })
      .catch(function() {});
  }

  // ─── Location Search ───
  var searchInput = document.getElementById("location-search");
  var searchResults = document.getElementById("location-search-results");
  var searchTimeout;

  searchInput.addEventListener("input", function() {
    clearTimeout(searchTimeout);
    var query = searchInput.value.trim();
    if (query.length < 3) { searchResults.classList.add("hidden"); return; }
    searchTimeout = setTimeout(function() {
      fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(query) + "&limit=5&addressdetails=1")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.length) {
            searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-textmuted">No results found</div>';
            searchResults.classList.remove("hidden");
            return;
          }
          searchResults.innerHTML = "";
          data.forEach(function(item) {
            var div = document.createElement("div");
            div.className = "px-4 py-3 hover:bg-background cursor-pointer border-b border-border/30 last:border-0 text-sm";
            div.textContent = item.display_name;
            div.addEventListener("click", function() {
              var lat = parseFloat(item.lat);
              var lon = parseFloat(item.lon);
              editMap.setView([lat, lon], 16);
              setPin(lat, lon, item.display_name.split(",").slice(0, 2).join(","));
              document.getElementById("location").value = item.display_name.split(",").slice(0, 2).join(",").trim();
              searchInput.value = item.display_name.split(",").slice(0, 3).join(",");
              searchResults.classList.add("hidden");
            });
            searchResults.appendChild(div);
          });
          searchResults.classList.remove("hidden");
        })
        .catch(function() {
          searchResults.innerHTML = '<div class="px-4 py-3 text-sm text-textmuted">Search unavailable</div>';
          searchResults.classList.remove("hidden");
        });
    }, 400);
  });

  document.addEventListener("click", function(e) {
    if (!document.getElementById("location-search-container").contains(e.target)) {
      searchResults.classList.add("hidden");
    }
  });

  // ─── Date helpers ───
  function isValidDateInput(value) {
    return /^(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/\d{4}$/.test(value);
  }

  function getISODateFromDateInput(value) {
    var parts = value.split("/");
    return parts[2] + "-" + parts[0] + "-" + parts[1];
  }

  function isoToDateInput(isoStr) {
    if (!isoStr) return "";
    var parts = isoStr.split("-");
    if (parts.length !== 3) return "";
    return parts[1] + "/" + parts[2] + "/" + parts[0];
  }

  document.getElementById("date-range-toggle").addEventListener("change", function() {
    document.getElementById("date-range-fields").classList.toggle("hidden", !this.checked);
    document.getElementById("date-single-wrapper").classList.toggle("hidden", this.checked);
  });

  // ─── Load Story ───
  if (!storyId) {
    document.getElementById("load-error").classList.remove("hidden");
    document.getElementById("story-subtitle").textContent = "No story ID provided.";
  } else {
    fetch(API_BASE + "/stories/" + storyId)
      .then(function(res) {
        if (!res.ok) throw new Error("Story not found.");
        return res.json();
      })
      .then(function(story) {
        document.getElementById("title").value = story.title || "";
        document.getElementById("story").value = story.content || "";
        document.getElementById("story-subtitle").textContent = "“" + (story.title || "Untitled") + "”";

        if (story.place_name) {
          document.getElementById("location").value = story.place_name;
        }

        if (story.latitude && story.longitude) {
          document.getElementById("latitude").value = String(story.latitude);
          document.getElementById("longitude").value = String(story.longitude);
          if (pinMarker) editMap.removeLayer(pinMarker);
          pinMarker = L.marker([story.latitude, story.longitude], { draggable: true }).addTo(editMap);
          pinMarker.on("dragend", function() {
            var pos = pinMarker.getLatLng();
            document.getElementById("latitude").value = pos.lat.toFixed(6);
            document.getElementById("longitude").value = pos.lng.toFixed(6);
            document.getElementById("selected-location-text").textContent = pos.lat.toFixed(4) + ", " + pos.lng.toFixed(4);
            reverseGeocode(pos.lat, pos.lng);
          });
          editMap.setView([story.latitude, story.longitude], 14);
          document.getElementById("selected-location-text").textContent =
            story.place_name || (story.latitude.toFixed(4) + ", " + story.longitude.toFixed(4));
          document.getElementById("selected-location").classList.remove("hidden");
        }

        var dateStart = story.date_start;
        var dateEnd = story.date_end;
        var datePrecision = story.date_precision;

        if (dateStart) {
          if (datePrecision === "year") {
            var startYear = dateStart.split("-")[0];
            var endYear = dateEnd ? dateEnd.split("-")[0] : startYear;
            if (startYear !== endYear) {
              document.getElementById("date-range-toggle").checked = true;
              document.getElementById("date-range-fields").classList.remove("hidden");
              document.getElementById("date-single-wrapper").classList.add("hidden");
              document.getElementById("date-start").value = "01/01/" + startYear;
              document.getElementById("date-end").value = "12/31/" + endYear;
            } else {
              document.getElementById("date-single").value = "01/01/" + startYear;
            }
          } else {
            var hasRange = dateEnd && dateStart !== dateEnd;
            if (hasRange) {
              document.getElementById("date-range-toggle").checked = true;
              document.getElementById("date-range-fields").classList.remove("hidden");
              document.getElementById("date-single-wrapper").classList.add("hidden");
              document.getElementById("date-start").value = isoToDateInput(dateStart);
              document.getElementById("date-end").value = isoToDateInput(dateEnd);
            } else {
              document.getElementById("date-single").value = isoToDateInput(dateStart);
            }
          }
        }

        if (tagInput && story.tags && story.tags.length > 0) {
          tagInput.setTags(story.tags);
        }

        document.getElementById("story-form").classList.remove("hidden");
        setTimeout(function() { editMap.invalidateSize(); }, 200);
      })
      .catch(function() {
        document.getElementById("story-subtitle").textContent = "Failed to load story.";
        document.getElementById("load-error").classList.remove("hidden");
      });
  }

  // ─── Form helpers ───
  function showError(msg) {
    var el = document.getElementById("form-error");
    el.textContent = msg;
    el.classList.remove("hidden");
    document.getElementById("form-success").classList.add("hidden");
  }

  function showSuccess(msg) {
    var el = document.getElementById("form-success");
    el.textContent = msg;
    el.classList.remove("hidden");
    document.getElementById("form-error").classList.add("hidden");
  }

  function setSaving(isSaving) {
    var btn = document.getElementById("btn-save");
    btn.disabled = isSaving;
    btn.textContent = isSaving ? "Saving..." : "Save Changes";
    btn.classList.toggle("opacity-70", isSaving);
    btn.classList.toggle("cursor-not-allowed", isSaving);
  }

  // ─── Form Submit ───
  document.getElementById("story-form").addEventListener("submit", async function(e) {
    e.preventDefault();

    document.getElementById("form-error").classList.add("hidden");
    document.getElementById("form-success").classList.add("hidden");

    var title = document.getElementById("title").value.trim();
    var content = document.getElementById("story").value.trim();
    var placeName = document.getElementById("location").value.trim();
    var lat = document.getElementById("latitude").value;
    var lng = document.getElementById("longitude").value;
    var usingDateRange = document.getElementById("date-range-toggle").checked;
    var dateSingle = document.getElementById("date-single").value.trim();
    var dateStart = document.getElementById("date-start").value.trim();
    var dateEnd = document.getElementById("date-end").value.trim();

    if (!title || !content) { showError("Please fill in the title and story content."); return; }
    if (!lat || !lng) { showError("Please pin a location on the map."); return; }
    if (!placeName) { showError("Please provide a location name."); return; }
    if (!usingDateRange && !isValidDateInput(dateSingle)) { showError("Date must use mm/dd/yyyy format."); return; }
    if (usingDateRange && (!dateStart || !dateEnd)) { showError("Please provide both start and end dates."); return; }
    if (usingDateRange && !isValidDateInput(dateStart)) { showError("Start date must use mm/dd/yyyy format."); return; }
    if (usingDateRange && !isValidDateInput(dateEnd)) { showError("End date must use mm/dd/yyyy format."); return; }
    if (usingDateRange && getISODateFromDateInput(dateEnd) < getISODateFromDateInput(dateStart)) {
      showError("End date must be greater than or equal to the start date.");
      return;
    }

    var payload = {
      title: title,
      content: content,
      summary: null,
      latitude: parseFloat(lat),
      longitude: parseFloat(lng),
      place_name: placeName,
      date_start: usingDateRange ? getISODateFromDateInput(dateStart) : getISODateFromDateInput(dateSingle),
      date_end: usingDateRange ? getISODateFromDateInput(dateEnd) : null,
      tags: tagInput ? tagInput.getTags() : []
    };

    setSaving(true);

    try {
      var res = await authFetch(API_BASE + "/stories/" + storyId, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        var data = {};
        try { data = await res.json(); } catch(_) {}
        throw new Error(typeof data.detail === "string" ? data.detail : "Failed to save changes.");
      }

      showSuccess("Story updated successfully! Redirecting...");
      setTimeout(function() {
        window.location.assign("story-detail.html?id=" + encodeURIComponent(storyId));
      }, 1500);
    } catch(err) {
      showError(err && err.message ? err.message : "Failed to save changes.");
    } finally {
      setSaving(false);
    }
  });

  function syncMapSize() {
    window.requestAnimationFrame(function() { editMap.invalidateSize(); });
  }
  setTimeout(syncMapSize, 200);
  window.addEventListener("resize", syncMapSize);
</script>
</body>
</html>

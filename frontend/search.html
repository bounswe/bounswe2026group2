<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Stories - Local History Map</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#fef9f0",
                        surface: "#ffffff",
                        primary: "#775a19",
                        "primary-light": "#c5a059",
                        secondary: "#506169",
                        tertiary: "#35618f",
                        border: "#e7e2d9",
                        textmain: "#1d1c16",
                        textmuted: "#5f584c"
                    },
                    fontFamily: {
                        body: ["Inter", "sans-serif"],
                        headline: ["Noto Serif", "serif"]
                    },
                    boxShadow: {
                        soft: "0 20px 50px rgba(0,0,0,0.08)"
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        }
        .distance-btn {
            padding: 5px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #e7e2d9;
            background: white;
            color: #5f584c;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .distance-btn.active {
            background: #1d1c16;
            color: white;
            border-color: #1d1c16;
        }
        .distance-btn:hover:not(.active) {
            border-color: #c5a059;
            color: #775a19;
        }
    </style>
</head>
<body class="bg-background text-textmain font-body min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-[#f8f3ea]/95 backdrop-blur-sm border-b border-border/30">
        <div class="flex items-center gap-4 w-full px-6 py-4 max-w-screen-xl mx-auto">
            <a href="map.html" class="flex items-center gap-2 text-textmuted hover:text-textmain transition-colors shrink-0">
                <span class="material-symbols-outlined text-xl">arrow_back</span>
                <span class="text-sm font-semibold hidden sm:inline">Map</span>
            </a>
            <form id="search-form" class="flex-1 flex items-center gap-3">
                <div class="relative flex-1 max-w-2xl">
                    <span class="absolute left-3.5 top-1/2 -translate-y-1/2 material-symbols-outlined text-textmuted text-xl">search</span>
                    <input id="search-input" name="q" type="text" autocomplete="off"
                        class="w-full pl-11 pr-4 py-3 bg-white border border-border rounded-xl text-sm focus:border-primary focus:ring-primary transition-all"
                        placeholder="Search stories by place name..." />
                </div>
                <button type="submit"
                    class="shrink-0 inline-flex items-center gap-2 bg-primary text-white px-5 py-3 rounded-xl text-sm font-semibold hover:opacity-95 transition-all">
                    Search
                </button>
            </form>
            <div class="relative shrink-0">
                <button id="filters-toggle-btn" type="button"
                    class="inline-flex items-center gap-1.5 bg-white border border-border text-textmuted px-4 py-3 rounded-xl text-sm font-semibold hover:border-primary/50 hover:text-textmain transition-all">
                    <span class="material-symbols-outlined text-xl">tune</span>
                    Filters
                </button>
                <!-- Filter Panel (dropdown) -->
                <div id="filter-panel" class="hidden absolute right-0 top-[calc(100%+0.5rem)] w-72 rounded-2xl border border-border bg-white shadow-soft z-50 p-5">
                <div class="flex flex-col gap-5">
                    <!-- Year Range -->
                    <div>
                        <label class="block text-xs font-semibold text-textmuted uppercase tracking-wider mb-2.5">Year Range</label>
                        <div class="flex items-center gap-2">
                            <input id="filter-year-from" type="number" placeholder="from" min="1" max="9999"
                                class="flex-1 min-w-0 border border-border rounded-lg px-3 py-2 text-sm focus:border-primary outline-none text-textmain placeholder:text-textmuted/50" />
                            <span class="text-textmuted shrink-0 text-sm">—</span>
                            <input id="filter-year-to" type="number" placeholder="to" min="1" max="9999"
                                class="flex-1 min-w-0 border border-border rounded-lg px-3 py-2 text-sm focus:border-primary outline-none text-textmain placeholder:text-textmuted/50" />
                        </div>
                    </div>
                    <!-- Distance -->
                    <div>
                        <label class="block text-xs font-semibold text-textmuted uppercase tracking-wider mb-2.5">Distance</label>
                        <div class="flex flex-wrap gap-1.5">
                            <button type="button" class="distance-btn active" data-value="">Anywhere</button>
                            <button type="button" class="distance-btn" data-value="500">500 m</button>
                            <button type="button" class="distance-btn" data-value="1000">1 km</button>
                            <button type="button" class="distance-btn" data-value="10000">10 km</button>
                            <button type="button" class="distance-btn" data-value="100000">100 km</button>
                        </div>
                    </div>
                    <!-- Tags -->
                    <div>
                        <label class="block text-xs font-semibold text-textmuted uppercase tracking-wider mb-2.5">Tags</label>
                        <div id="filter-panel-tags" class="flex flex-wrap gap-1.5 mb-2 min-h-[28px]"></div>
                        <div class="flex items-center gap-2">
                            <input id="filter-panel-tag-input" type="text" placeholder="Tag name..."
                                class="hidden text-xs border border-border rounded-full px-3 py-1.5 outline-none focus:border-primary w-28 text-textmain placeholder:text-textmuted/50"
                                onkeydown="if(event.key==='Enter'){event.preventDefault();addPanelTag();}" />
                            <button id="filter-panel-add-tag-btn" type="button"
                                class="inline-flex items-center gap-1 text-xs font-semibold text-primary border border-primary/30 bg-[rgba(119,90,25,0.05)] rounded-full px-3 py-1.5 hover:bg-[rgba(119,90,25,0.1)] transition-colors">
                                <span class="material-symbols-outlined" style="font-size:14px;line-height:1.2;">add</span>
                                Add tag
                            </button>
                        </div>
                    </div>
                    <!-- Actions -->
                    <div class="pt-4 border-t border-border/30 flex items-center justify-end gap-3">
                        <button id="filter-reset-btn" type="button"
                            class="px-4 py-2 text-sm font-semibold text-textmuted border border-border rounded-xl hover:border-primary/50 hover:text-textmain transition-all">
                            Reset
                        </button>
                        <button id="filter-apply-btn" type="button"
                            class="px-4 py-2 text-sm font-semibold text-white bg-primary rounded-xl hover:opacity-95 transition-all shadow-sm">
                            Apply
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Content -->
    <main class="max-w-screen-xl mx-auto px-6 py-8">

        <!-- Status -->
        <div id="status" class="mb-6">
            <p class="text-textmuted text-sm">Enter a place name to search for stories.</p>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="w-8 h-8 border-3 border-primary/30 border-t-primary rounded-full animate-spin"></div>
            <p class="mt-4 text-sm text-textmuted">Searching stories...</p>
        </div>

        <!-- Results Grid -->
        <div id="results" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3"></div>

        <!-- Empty State -->
        <div id="empty" class="hidden flex flex-col items-center justify-center py-20">
            <span class="material-symbols-outlined text-5xl text-textmuted/40">search_off</span>
            <p class="mt-4 text-base font-semibold text-textmain">No stories found</p>
            <p id="empty-detail" class="mt-1 text-sm text-textmuted">Try a different place name.</p>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="anonymous.js"></script>
    <script src="tags.js"></script>
    <script src="search-filters.js"></script>
    <script>
        var searchForm = document.getElementById("search-form");
        var searchInput = document.getElementById("search-input");
        var statusEl = document.getElementById("status");
        var loadingEl = document.getElementById("loading");
        var resultsEl = document.getElementById("results");
        var emptyEl = document.getElementById("empty");
        var emptyDetail = document.getElementById("empty-detail");

        // State
        var storyCache = {};
        var allStories = [];
        var filterTags = [];
        var sortOrder = "relevance";
        var lastQuery = "";
        var filterYearFrom = "";
        var filterYearTo = "";
        var filterDistance = "";
        var filterPanelTags = [];

        // Read initial state from URL
        filterTags = parseTagsFromUrl(window.location.search);
        sortOrder = parseSortFromUrl(window.location.search);
        var initialQuery = new URLSearchParams(window.location.search).get("q") || "";

        if (initialQuery) searchInput.value = initialQuery;
        if (initialQuery) performSearch(initialQuery);
        else if (filterTags.length > 0) performSearch("");

        // ─── Search form ──────────────────────────────────────────────────────

        searchForm.addEventListener("submit", function (e) {
            e.preventDefault();
            var query = searchInput.value.trim();
            updateUrlParams(query);
            performSearch(query);
        });

        // ─── Filter state management ──────────────────────────────────────────

        function updateUrlParams(query) {
            var url = new URL(window.location);
            if (query) url.searchParams.set("q", query);
            if (filterTags.length > 0) {
                url.searchParams.set("tags", serializeTagsToUrl(filterTags));
            } else {
                url.searchParams.delete("tags");
            }
            if (sortOrder !== "relevance") {
                url.searchParams.set("sort", sortOrder);
            } else {
                url.searchParams.delete("sort");
            }
            window.history.replaceState({}, "", url);
        }

        // ─── Search & render ──────────────────────────────────────────────────

        async function performSearch(query) {
            lastQuery = query;
            statusEl.classList.add("hidden");
            emptyEl.classList.add("hidden");
            resultsEl.innerHTML = "";
            loadingEl.classList.remove("hidden");

            try {
                var params = new URLSearchParams();
                if (filterYearFrom !== "" || filterYearTo !== "") {
                    params.set("query_start", filterYearFrom !== "" ? filterYearFrom : "1");
                    params.set("query_end", filterYearTo !== "" ? filterYearTo : "9999");
                    params.set("query_precision", "year");
                }
                filterTags.forEach(function (t) { params.append("tags", t); });
                var fetchUrl;
                if (query) {
                    params.set("place_name", query);
                    fetchUrl = API_BASE + "/stories/search?" + params.toString();
                } else {
                    var paramStr = params.toString();
                    fetchUrl = API_BASE + "/stories" + (paramStr ? "?" + paramStr : "");
                }

                var response = await fetch(fetchUrl);
                if (!response.ok) throw new Error("Search request failed");
                var data = await response.json();
                var stories = data.stories || (Array.isArray(data) ? data : []);

                loadingEl.classList.add("hidden");

                if (stories.length === 0) {
                    allStories = [];
                    emptyEl.classList.remove("hidden");
                    emptyDetail.textContent = query
                        ? 'No stories found for "' + query + '". Try a different place name.'
                        : 'No stories found matching the selected tags.';
                    return;
                }

                // Fetch full details in parallel to get tags and media
                var detailPromises = stories.map(function (story) {
                    return fetchStoryDetail(story.id);
                });
                var details = await Promise.allSettled(detailPromises);

                details.forEach(function (result, i) {
                    if (result.status === "fulfilled" && result.value) {
                        var detail = result.value;
                        storyCache[detail.id] = detail;
                        stories[i].tags = detail.tags || [];
                        stories[i].media_files = detail.media_files || [];
                        stories[i].date_start = detail.date_start || stories[i].date_start || "";
                    }
                });

                allStories = stories;
                applyFiltersAndSort();

            } catch (err) {
                loadingEl.classList.add("hidden");
                statusEl.classList.remove("hidden");
                statusEl.innerHTML = '<p class="text-red-600 text-sm">Failed to search stories. Please try again.</p>';
                console.error("Search error:", err);
            }
        }

        async function fetchStoryDetail(storyId) {
            if (storyCache[storyId]) return storyCache[storyId];
            var response = await fetch(API_BASE + "/stories/" + storyId);
            if (!response.ok) return null;
            var detail = await response.json();
            storyCache[storyId] = detail;
            return detail;
        }

        function hasActiveFilters() {
            return filterTags.length > 0 || filterYearFrom !== "" || filterYearTo !== "" || filterDistance !== "";
        }

        function applyFiltersAndSort() {
            if (allStories.length === 0) return;

            // tags and year are already filtered by the backend; only sort client-side
            var sorted = sortStories(allStories, sortOrder);

            resultsEl.innerHTML = "";
            emptyEl.classList.add("hidden");
            statusEl.classList.remove("hidden");

            var total = allStories.length;
            var count = sorted.length;

            if (count === 0) {
                emptyEl.classList.remove("hidden");
                emptyDetail.textContent = hasActiveFilters()
                    ? "No stories match the selected filters. Try adjusting your filters."
                    : 'No stories found for "' + lastQuery + '". Try a different place name.';
                statusEl.innerHTML = '<p class="text-textmuted text-sm">Found <strong class="text-textmain">0</strong> of <strong class="text-textmain">' + total + '</strong> ' + (total === 1 ? 'story' : 'stories') + ' matching your filters.</p>';
                return;
            }

            var countText;
            if (lastQuery && hasActiveFilters()) {
                countText = '<strong class="text-textmain">' + count + '</strong> of <strong class="text-textmain">' + total + '</strong> ' + (total === 1 ? 'story' : 'stories') + ' matching filters for "<strong class="text-textmain">' + escapeHtml(lastQuery) + '</strong>"';
            } else if (lastQuery) {
                countText = '<strong class="text-textmain">' + count + '</strong> ' + (count === 1 ? 'story' : 'stories') + ' for "<strong class="text-textmain">' + escapeHtml(lastQuery) + '</strong>"';
            } else {
                countText = '<strong class="text-textmain">' + count + '</strong> ' + (count === 1 ? 'story' : 'stories') + ' matching selected filters';
            }
            statusEl.innerHTML = '<p class="text-textmuted text-sm">Found ' + countText + '</p>';

            sorted.forEach(function (story) {
                resultsEl.appendChild(createStoryCard(story));
            });
        }

        function createStoryCard(story) {
            var card = document.createElement("a");
            card.href = "story-detail.html?id=" + story.id;
            card.id = "card-" + story.id;
            card.className = "group block overflow-hidden rounded-2xl border border-border bg-surface shadow-sm hover:shadow-soft transition-all";

            var placeName = story.place_name || "";
            var dateLabel = story.date_label || "";
            var preview = (story.content || "").length > 150
                ? story.content.substring(0, 150) + "..."
                : (story.content || "");

            // Media
            var images = (story.media_files || []).filter(function (m) { return m.media_type === "image"; });
            var mediaInner = images.length > 0
                ? '<img src="' + escapeHtml(images[0].media_url) + '" alt="' + escapeHtml(story.title) + '" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />' +
                  (images.length > 1 ? '<div class="absolute bottom-2 right-2 bg-black/50 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">+' + (images.length - 1) + '</div>' : '')
                : '<span class="material-symbols-outlined text-4xl text-primary/30">photo_library</span>';

            // Tags
            var tags = story.tags || [];
            var tagsHtml = "";
            if (tags.length > 0) {
                var visibleTags = tags.slice(0, 4);
                tagsHtml = '<div class="mt-3 flex flex-wrap gap-1">';
                visibleTags.forEach(function (tag) {
                    var tagName = typeof tag === "string" ? tag : (tag && tag.name ? tag.name : "");
                    if (tagName) {
                        tagsHtml += '<span class="inline-flex items-center rounded-full bg-[rgba(119,90,25,0.08)] border border-[rgba(119,90,25,0.15)] px-2 py-0.5 text-[10px] font-semibold text-primary">' + escapeHtml(tagName) + '</span>';
                    }
                });
                if (tags.length > 4) {
                    tagsHtml += '<span class="inline-flex items-center rounded-full bg-border/50 px-2 py-0.5 text-[10px] font-semibold text-textmuted">+' + (tags.length - 4) + '</span>';
                }
                tagsHtml += '</div>';
            }

            card.innerHTML =
                '<div class="h-44 bg-gradient-to-br from-[#e9dfcd] to-[#f7f3eb] flex items-center justify-center relative overflow-hidden">' +
                    mediaInner +
                '</div>' +
                '<div class="p-5">' +
                    '<div class="flex items-center gap-2 mb-2">' +
                        (dateLabel ? '<span class="text-[10px] font-bold text-tertiary tracking-widest uppercase">' + escapeHtml(dateLabel) + '</span>' : '') +
                        (dateLabel && placeName ? '<span class="text-border">|</span>' : '') +
                        (placeName ? '<span class="text-[11px] font-semibold text-primary truncate">' + escapeHtml(placeName) + '</span>' : '') +
                    '</div>' +
                    '<h3 class="font-headline font-bold text-base text-textmain leading-snug group-hover:text-primary transition-colors">' + escapeHtml(story.title) + '</h3>' +
                    '<p class="mt-1 text-xs text-textmuted' + (isAnonymousStory(story) ? ' italic' : '') + '">' + escapeHtml(getAuthorByLine(story)) + '</p>' +
                    '<p class="mt-2.5 text-sm text-textmuted leading-relaxed line-clamp-3">' + escapeHtml(preview) + '</p>' +
                    tagsHtml +
                    '<div class="mt-4 flex items-center gap-1 text-xs font-bold text-primary">' +
                        'Read Story' +
                        '<span class="material-symbols-outlined text-sm group-hover:translate-x-0.5 transition-transform">arrow_forward</span>' +
                    '</div>' +
                '</div>';

            return card;
        }

        function escapeHtml(str) {
            var div = document.createElement("div");
            div.appendChild(document.createTextNode(str || ""));
            return div.innerHTML;
        }

        // ─── Filter Panel ─────────────────────────────────────────────────────

        var filtersToggleBtn = document.getElementById("filters-toggle-btn");
        var filterPanelEl = document.getElementById("filter-panel");

        function setFiltersToggleActive(active) {
            if (active) {
                filtersToggleBtn.classList.add("bg-textmain", "text-white", "border-textmain");
                filtersToggleBtn.classList.remove("bg-white", "text-textmuted", "border-border");
            } else {
                filtersToggleBtn.classList.remove("bg-textmain", "text-white", "border-textmain");
                filtersToggleBtn.classList.add("bg-white", "text-textmuted", "border-border");
            }
        }

        filtersToggleBtn.addEventListener("click", function () {
            var isHidden = filterPanelEl.classList.toggle("hidden");
            setFiltersToggleActive(!isHidden);
            if (!isHidden) {
                // Panel açıldı: mevcut aktif filtreleri panele yükle
                filterPanelTags = filterTags.slice();
                renderPanelTags();
                document.getElementById("filter-year-from").value = filterYearFrom;
                document.getElementById("filter-year-to").value = filterYearTo;
                document.querySelectorAll(".distance-btn").forEach(function (b) {
                    b.classList.toggle("active", b.dataset.value === filterDistance);
                });
            }
        });

        // Distance buttons
        document.querySelectorAll(".distance-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
                document.querySelectorAll(".distance-btn").forEach(function (b) { b.classList.remove("active"); });
                filterDistance = this.dataset.value;
                this.classList.add("active");
            });
        });

        // Panel tag input
        function addPanelTag() {
            var input = document.getElementById("filter-panel-tag-input");
            var val = input.value.trim().toLowerCase();
            if (!val || filterPanelTags.indexOf(val) !== -1) return;
            filterPanelTags.push(val);
            renderPanelTags();
            input.value = "";
            input.focus();
        }

        function renderPanelTags() {
            var container = document.getElementById("filter-panel-tags");
            if (!container) return;
            container.innerHTML = "";
            filterPanelTags.forEach(function (tag) {
                var chip = document.createElement("span");
                chip.className = "inline-flex items-center gap-1 rounded-full bg-[rgba(119,90,25,0.12)] border border-[rgba(119,90,25,0.2)] px-2.5 py-0.5 text-xs font-semibold text-primary";
                var nameSpan = document.createElement("span");
                nameSpan.textContent = tag;
                var removeIcon = document.createElement("span");
                removeIcon.textContent = "×";
                removeIcon.style.cssText = "cursor:pointer;line-height:1;opacity:0.6;font-size:14px;";
                removeIcon.addEventListener("mouseover", function () { this.style.opacity = "1"; });
                removeIcon.addEventListener("mouseout", function () { this.style.opacity = "0.6"; });
                (function (t) {
                    removeIcon.addEventListener("click", function () {
                        filterPanelTags = filterPanelTags.filter(function (x) { return x !== t; });
                        renderPanelTags();
                    });
                }(tag));
                chip.appendChild(nameSpan);
                chip.appendChild(removeIcon);
                container.appendChild(chip);
            });
        }

        document.getElementById("filter-panel-add-tag-btn").addEventListener("click", function () {
            var input = document.getElementById("filter-panel-tag-input");
            if (input.classList.contains("hidden")) {
                input.classList.remove("hidden");
                this.classList.add("hidden");
                input.focus();
            } else {
                addPanelTag();
            }
        });

        document.getElementById("filter-panel-tag-input").addEventListener("blur", function () {
            if (!this.value.trim()) {
                this.classList.add("hidden");
                document.getElementById("filter-panel-add-tag-btn").classList.remove("hidden");
            }
        });

        document.getElementById("filter-apply-btn").addEventListener("click", function () {
            filterYearFrom = document.getElementById("filter-year-from").value.trim();
            filterYearTo = document.getElementById("filter-year-to").value.trim();
            filterTags = filterPanelTags.slice();
            filterPanelTags = [];
            renderPanelTags();
            filterPanelEl.classList.add("hidden");
            setFiltersToggleActive(false);
            allStories = [];
            var query = searchInput.value.trim() || lastQuery;
            updateUrlParams(query);
            performSearch(query);
        });

        document.getElementById("filter-reset-btn").addEventListener("click", function () {
            filterYearFrom = "";
            filterYearTo = "";
            filterDistance = "";
            filterPanelTags = [];
            filterTags = [];
            document.getElementById("filter-year-from").value = "";
            document.getElementById("filter-year-to").value = "";
            document.querySelectorAll(".distance-btn").forEach(function (b) {
                b.classList.remove("active");
                if (b.dataset.value === "") b.classList.add("active");
            });
            renderPanelTags();
            updateUrlParams(lastQuery);
            allStories = [];
            performSearch(lastQuery);
        });
    </script>
</body>
</html>

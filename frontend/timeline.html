<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline - Local History Map</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: "#fef9f0",
            surface: "#ffffff",
            primary: "#775a19",
            "primary-light": "#c5a059",
            tertiary: "#35618f",
            border: "#e7e2d9",
            textmain: "#1d1c16",
            textmuted: "#5f584c"
          },
          fontFamily: {
            body: ["Inter", "sans-serif"],
            headline: ["Noto Serif", "serif"]
          },
          boxShadow: {
            soft: "0 20px 50px rgba(0,0,0,0.08)"
          }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
  </style>
</head>
<body class="min-h-screen bg-background text-textmain font-body">
  <header class="sticky top-0 z-50 border-b border-border/30 bg-[#f8f3ea]/95 backdrop-blur-sm">
    <div class="mx-auto flex max-w-5xl items-center justify-between gap-4 px-5 py-4">
      <a href="map.html" class="inline-flex items-center gap-2 text-sm font-semibold text-primary hover:underline">
        <span aria-hidden="true">&larr;</span>
        Back to Map
      </a>
      <div class="text-right">
        <h1 class="font-headline text-2xl font-bold text-textmain">Timeline</h1>
        <p id="timeline-scope" class="text-xs font-medium text-textmuted">Loading nearby stories...</p>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-5 py-8">
    <form id="radius-form" class="mb-5 rounded-2xl border border-border bg-white/85 px-5 py-4 shadow-sm">
      <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        <div>
          <label for="radius-slider" class="text-sm font-semibold text-textmain">Timeline radius</label>
          <p id="radius-value" class="mt-1 text-xs font-medium text-textmuted">1 km</p>
        </div>
        <div class="flex flex-1 flex-col gap-3 md:max-w-xl md:flex-row md:items-center">
          <div class="flex flex-1 items-center gap-3">
            <span class="text-xs font-semibold text-textmuted">100 m</span>
            <input
              id="radius-slider"
              name="radius_km"
              type="range"
              min="0.1"
              max="10"
              step="0.1"
              value="1"
              class="h-2 flex-1 cursor-pointer accent-primary"
            />
            <span class="text-xs font-semibold text-textmuted">10 km</span>
          </div>
          <button
            id="radius-apply"
            type="submit"
            class="inline-flex items-center justify-center rounded-xl bg-primary px-4 py-2 text-sm font-semibold text-white transition hover:opacity-95 disabled:cursor-not-allowed disabled:opacity-60"
          >
            Apply
          </button>
        </div>
      </div>
    </form>

    <form id="date-filter-form" class="mb-5 rounded-2xl border border-border bg-white/85 px-5 py-4 shadow-sm">
      <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
          <h2 class="text-sm font-semibold text-textmain">Date filter</h2>
          <p class="mt-1 text-xs font-medium text-textmuted">Filter nearby stories by their starting date.</p>
        </div>
        <div class="grid gap-3 sm:grid-cols-2 md:flex md:items-end">
          <label class="text-xs font-semibold text-textmuted">
            Starting date
            <input
              id="date-start"
              type="date"
              class="mt-1 block w-full rounded-xl border-border text-sm text-textmain focus:border-primary focus:ring-primary"
            />
          </label>
          <label class="text-xs font-semibold text-textmuted">
            Ending date
            <input
              id="date-end"
              type="date"
              class="mt-1 block w-full rounded-xl border-border text-sm text-textmain focus:border-primary focus:ring-primary"
            />
          </label>
          <button
            type="submit"
            class="inline-flex items-center justify-center rounded-xl bg-tertiary px-4 py-2.5 text-sm font-semibold text-white transition hover:opacity-95"
          >
            Apply
          </button>
          <button
            id="date-clear"
            type="button"
            class="inline-flex items-center justify-center rounded-xl border border-border bg-white px-4 py-2.5 text-sm font-semibold text-textmain transition hover:bg-stone-50"
          >
            Clear
          </button>
        </div>
      </div>
    </form>

    <div id="timeline-status" class="rounded-2xl border border-border bg-white/80 px-5 py-4 text-sm text-textmuted shadow-sm" role="status" aria-live="polite">
      Loading timeline...
    </div>

    <section id="timeline-list" class="mt-8 hidden" aria-label="Timeline stories">
      <div class="relative">
        <div class="absolute left-10 top-0 h-full w-px bg-border md:left-12" aria-hidden="true"></div>
        <ol id="timeline-items" class="space-y-6"></ol>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script>
    var statusEl = document.getElementById("timeline-status");
    var scopeEl = document.getElementById("timeline-scope");
    var listEl = document.getElementById("timeline-list");
    var itemsEl = document.getElementById("timeline-items");
    var radiusForm = document.getElementById("radius-form");
    var radiusSlider = document.getElementById("radius-slider");
    var radiusValue = document.getElementById("radius-value");
    var radiusApply = document.getElementById("radius-apply");
    var dateFilterForm = document.getElementById("date-filter-form");
    var dateStartInput = document.getElementById("date-start");
    var dateEndInput = document.getElementById("date-end");
    var dateClear = document.getElementById("date-clear");
    var currentLat = null;
    var currentLng = null;
    var timelineItems = [];

    function getNumberParam(params, names, fallback) {
      for (var i = 0; i < names.length; i++) {
        var value = params.get(names[i]);
        if (value === null || value === "") continue;
        var parsed = Number(value);
        if (Number.isFinite(parsed)) return parsed;
      }
      return fallback;
    }

    function clampRadius(value) {
      if (!Number.isFinite(value)) return 1;
      return Math.min(10, Math.max(0.1, value));
    }

    function formatRadius(value) {
      var rounded = Math.round(value * 10) / 10;
      if (rounded < 1) return Math.round(rounded * 1000) + " m";
      if (Number.isInteger(rounded)) return rounded + " km";
      return rounded.toFixed(1) + " km";
    }

    function updateRadiusDisplay() {
      radiusValue.textContent = formatRadius(Number(radiusSlider.value));
    }

    function dateOnlyTime(value) {
      if (!value) return null;
      var datePart = String(value).slice(0, 10);
      var match = datePart.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (match) {
        return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3])).getTime();
      }

      var date = new Date(value);
      if (Number.isNaN(date.getTime())) return null;
      return new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
    }

    function storyDateTime(story) {
      return dateOnlyTime(story.date_start);
    }

    function extractYear(value) {
      if (!value) return "";
      var match = String(value).match(/^(\d{4})/);
      return match ? match[1] : "";
    }

    function storyYearLabel(story) {
      var startYear = extractYear(story.date_start);
      var endYear = extractYear(story.date_end);

      if (!startYear) return "No date";
      if (endYear && endYear !== startYear) return startYear + "-" + endYear;
      return startYear;
    }

    function escapeHtml(value) {
      var div = document.createElement("div");
      div.appendChild(document.createTextNode(value == null ? "" : String(value)));
      return div.innerHTML;
    }

    function compareByDateAscending(a, b) {
      if (!a.date_start && !b.date_start) return 0;
      if (!a.date_start) return 1;
      if (!b.date_start) return -1;
      return new Date(a.date_start).getTime() - new Date(b.date_start).getTime();
    }

    function findCoverImage(detail) {
      var mediaFiles = detail && detail.media_files ? detail.media_files : [];
      for (var i = 0; i < mediaFiles.length; i++) {
        if (mediaFiles[i].media_type === "image") {
          return mediaFiles[i].media_url;
        }
      }
      return "";
    }

    async function fetchStoryDetail(story) {
      try {
        var response = await fetch(API_BASE + "/stories/" + encodeURIComponent(story.id));
        if (!response.ok) return { story: story, coverImage: "" };
        var detail = await response.json();
        return { story: story, coverImage: findCoverImage(detail) };
      } catch (err) {
        return { story: story, coverImage: "" };
      }
    }

    function renderTimelineItem(item) {
      var story = item.story;
      var coverImage = item.coverImage;
      var placeName = story.place_name || "Unknown location";
      var yearLabel = storyYearLabel(story);
      var imageHtml = coverImage
        ? '<img src="' + escapeHtml(coverImage) + '" alt="" class="h-52 w-full object-cover transition duration-300 group-hover:scale-[1.02]" loading="lazy">'
        : '<div class="flex h-52 w-full items-center justify-center bg-gradient-to-br from-[#e9dfcd] to-[#f7f3eb]"><span class="material-symbols-outlined text-5xl text-primary/30">photo_library</span></div>';

      var li = document.createElement("li");
      li.className = "relative pl-24 md:pl-28";
      li.innerHTML =
        '<div class="absolute left-0 top-1/2 z-10 flex w-20 -translate-y-1/2 justify-center md:w-24" aria-hidden="true">' +
          '<span class="rounded-full border border-border bg-background px-2.5 py-1 text-[11px] font-bold leading-none text-primary shadow-sm">' + escapeHtml(yearLabel) + '</span>' +
        '</div>' +
        '<a href="story-detail.html?id=' + encodeURIComponent(story.id) + '" class="group block overflow-hidden rounded-2xl border border-border bg-surface shadow-sm transition hover:shadow-soft">' +
          imageHtml +
          '<div class="p-5">' +
            '<h2 class="font-headline text-xl font-bold leading-snug text-textmain group-hover:text-primary">' + escapeHtml(story.title || "Untitled story") + '</h2>' +
            '<p class="mt-2 inline-flex items-center gap-1.5 text-sm font-semibold text-tertiary">' +
              '<span class="material-symbols-outlined text-[17px]" aria-hidden="true">location_on</span>' +
              '<span>' + escapeHtml(placeName) + '</span>' +
            '</p>' +
          '</div>' +
        '</a>';
      itemsEl.appendChild(li);
    }

    function renderFilteredTimeline() {
      var startTime = dateOnlyTime(dateStartInput.value);
      var endTime = dateOnlyTime(dateEndInput.value);
      var hasDateFilter = startTime !== null || endTime !== null;

      if (startTime !== null && endTime !== null && startTime > endTime) {
        listEl.classList.add("hidden");
        itemsEl.innerHTML = "";
        statusEl.textContent = "Start date must be before ending date.";
        return;
      }

      var filteredItems = timelineItems.filter(function (item) {
        if (!hasDateFilter) return true;

        var itemTime = storyDateTime(item.story);
        if (itemTime === null) return false;
        if (startTime !== null && itemTime < startTime) return false;
        if (endTime !== null && itemTime > endTime) return false;
        return true;
      });

      itemsEl.innerHTML = "";

      if (filteredItems.length === 0) {
        listEl.classList.add("hidden");
        statusEl.textContent = hasDateFilter
          ? "No stories match this date filter."
          : "No stories found near this location.";
        return;
      }

      listEl.classList.remove("hidden");
      filteredItems.forEach(renderTimelineItem);

      statusEl.textContent = filteredItems.length + " " + (filteredItems.length === 1 ? "story" : "stories") +
        (hasDateFilter ? " match this date filter" : " near this location");
    }

    async function loadTimeline() {
      var params = new URLSearchParams(window.location.search);
      var lat = getNumberParam(params, ["lat", "latitude"], null);
      var lng = getNumberParam(params, ["lng", "longitude"], null);
      var radiusKm = clampRadius(getNumberParam(params, ["radius_km", "radiusKm"], 1));
      currentLat = lat;
      currentLng = lng;
      radiusSlider.value = String(radiusKm);
      updateRadiusDisplay();

      if (lat === null || lng === null) {
        scopeEl.textContent = "Missing location";
        statusEl.textContent = "Timeline needs latitude and longitude from a story pin.";
        radiusApply.disabled = true;
        dateFilterForm.classList.add("hidden");
        return;
      }

      scopeEl.textContent = radiusKm + " km around " + lat.toFixed(4) + ", " + lng.toFixed(4);

      try {
        var query = new URLSearchParams({
          lat: String(lat),
          lng: String(lng),
          radius_km: String(radiusKm)
        });
        var response = await fetch(API_BASE + "/stories/nearby?" + query.toString());
        if (!response.ok) throw new Error("Failed to load nearby stories");

        var data = await response.json();
        var stories = (data.stories || []).slice().sort(compareByDateAscending);

        if (stories.length === 0) {
          statusEl.textContent = "No stories found near this location.";
          return;
        }

        timelineItems = await Promise.all(stories.map(fetchStoryDetail));
        renderFilteredTimeline();
      } catch (err) {
        statusEl.textContent = "Could not load the timeline. Please try again.";
      }
    }

    loadTimeline();

    radiusSlider.addEventListener("input", updateRadiusDisplay);
    radiusForm.addEventListener("submit", function (event) {
      event.preventDefault();
      if (currentLat === null || currentLng === null) return;

      var radiusKm = clampRadius(Number(radiusSlider.value));
      var query = new URLSearchParams({
        lat: String(currentLat),
        lng: String(currentLng),
        radius_km: String(radiusKm)
      });
      window.location.assign("timeline.html?" + query.toString());
    });

    dateFilterForm.addEventListener("submit", function (event) {
      event.preventDefault();
      renderFilteredTimeline();
    });

    dateClear.addEventListener("click", function () {
      dateStartInput.value = "";
      dateEndInput.value = "";
      renderFilteredTimeline();
    });
  </script>
</body>
</html>

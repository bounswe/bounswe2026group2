name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 0. HEALTH CHECK ──────────────────────────────────────────────────────────

  backend-health:
    name: Backend Health Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: localhistory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 10); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/localhistory
          LOG_SQL: "false"
          STORAGE_ENDPOINT: http://localhost:9000
          STORAGE_ACCESS_KEY: minioadmin
          STORAGE_SECRET_KEY: minioadmin
          STORAGE_REGION: us-east-1
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: Check /health returns ok
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep '"status":"ok"'
          echo "$RESPONSE" | grep '"db":"ok"'
          echo "$RESPONSE" | grep '"storage":"ok"'

  # ── 1. UNIT TESTS ────────────────────────────────────────────────────────────

  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend unit tests
        working-directory: backend
        run: python -m pytest tests/ -v

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

  # ── 2. INTEGRATION TESTS ─────────────────────────────────────────────────────
  # Activate when backend routers and models are implemented.

  # backend-integration:
  #   name: Backend Integration Tests
  #   runs-on: ubuntu-latest
  #   needs: [backend-unit]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with: { python-version: '3.11' }
  #     - run: pip install -r requirements.txt
  #       working-directory: backend
  #     - run: python -m pytest tests/integration/ -v
  #       working-directory: backend

  # ── 3. API TESTS ─────────────────────────────────────────────────────────────
  # Activate when API endpoints (stories, auth) are implemented.

  # backend-api:
  #   name: Backend API Tests
  #   runs-on: ubuntu-latest
  #   needs: [backend-integration]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with: { python-version: '3.11' }
  #     - run: pip install -r requirements.txt
  #       working-directory: backend
  #     - run: python -m pytest tests/api/ -v
  #       working-directory: backend

  # ── 4. E2E TESTS ─────────────────────────────────────────────────────────────
  # Activate when frontend routing and backend API are connected.

  # e2e:
  #   name: E2E Tests
  #   runs-on: ubuntu-latest
  #   needs: [backend-api, frontend-unit]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: npx playwright test

  # ── 5. DEPLOY ─────────────────────────────────────────────────────────────────

  trigger-deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    needs: [backend-health, backend-unit, frontend-unit]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')

    steps:
      - name: Trigger Deploy Workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: context.ref,
            });

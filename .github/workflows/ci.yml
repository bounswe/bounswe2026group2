name: CI

on:
  push:
  pull_request:

jobs:
  # ── 0a. LINT & FORMAT ───────────────────────────────────────────────────────

  backend-lint:
    name: Backend Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        working-directory: backend
        run: ruff check .

      - name: Run ruff format check
        working-directory: backend
        run: ruff format --check .

  frontend-lint:
    name: Frontend Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # ── 0b. HEALTH CHECK ────────────────────────────────────────────────────────

  backend-health:
    name: Backend Health Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: localhistory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 10); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/localhistory
          LOG_SQL: "false"
          STORAGE_ENDPOINT: http://localhost:9000
          STORAGE_ACCESS_KEY: minioadmin
          STORAGE_SECRET_KEY: minioadmin
          STORAGE_REGION: us-east-1
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: Check /health returns ok
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/health)
          echo "$RESPONSE"
          echo "$RESPONSE" | grep '"status":"ok"'
          echo "$RESPONSE" | grep '"db":"ok"'
          echo "$RESPONSE" | grep '"storage":"ok"'

  # ── 1. UNIT TESTS ────────────────────────────────────────────────────────────

  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: [backend-health, backend-lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend unit tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/localhistory
        run: pytest tests/unit/ -v --html=unit-report.html --self-contained-html --junitxml=unit-report.xml

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-reports
          path: |
            backend/unit-report.html
            backend/unit-report.xml

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-test-reports
          path: |
            frontend/test-report.html
            frontend/test-report.xml

  # ── 2. INTEGRATION TESTS ─────────────────────────────────────────────────────

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-unit]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: localhistory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/localhistory
          STORAGE_ENDPOINT: http://localhost:9000
          STORAGE_ACCESS_KEY: minioadmin
          STORAGE_SECRET_KEY: minioadmin
          STORAGE_REGION: us-east-1
        run: pytest tests/integration/ -v --html=integration-report.html --self-contained-html --junitxml=integration-report.xml

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-test-reports
          path: |
            backend/integration-report.html
            backend/integration-report.xml

  # ── 3. API TESTS ─────────────────────────────────────────────────────────────

  backend-api:
    name: Backend API Tests
    runs-on: ubuntu-latest
    needs: [backend-integration]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: localhistory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run API tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/localhistory
          STORAGE_ENDPOINT: http://localhost:9000
          STORAGE_ACCESS_KEY: minioadmin
          STORAGE_SECRET_KEY: minioadmin
          STORAGE_REGION: us-east-1
        run: pytest tests/api/ -v --html=api-report.html --self-contained-html --junitxml=api-report.xml

      - name: Upload API test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-test-reports
          path: |
            backend/api-report.html
            backend/api-report.xml

  # ── 4. E2E TESTS ─────────────────────────────────────────────────────────────

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-api, frontend-unit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run E2E tests
        run: echo "playwright test"  # placeholder

  # ── 5. DEPLOY ─────────────────────────────────────────────────────────────────

  trigger-deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    needs: e2e
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')

    steps:
      - name: Trigger Deploy Workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: context.ref,
            });

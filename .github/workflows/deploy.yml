name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Set Render Service ID
        id: set-service
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "SERVICE_ID=${{ secrets.BACKEND_SERVICE_ID }}" >> $GITHUB_OUTPUT
          else
            echo "SERVICE_ID=${{ secrets.BACKEND_SERVICE_ID_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Render Deploy
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ steps.set-service.outputs.SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

  deploy-frontend:
    name: Deploy Frontend to Render
    runs-on: ubuntu-latest

    steps:
      - name: Set Render Service ID
        id: set-service
        run: echo 'PLACEHOLDER'  # Frontend deployment will be implemented here

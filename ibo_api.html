<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibo's API Page</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 40px; 
            background: #f8fafc; 
            color: #1e293b;
            line-height: 1.6;
        }
        .container { 
            max-width: 800px;
            margin: 0 auto;
            background: white; 
            padding: 32px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
        }
        h1 { color: #4f46e5; margin-bottom: 16px; }
        .description { 
            background: #eff6ff; 
            padding: 16px; 
            border-left: 4px solid #3b82f6; 
            margin-bottom: 24px; 
        }
        pre { 
            background: #1e293b; 
            color: #f8fafc; 
            padding: 20px; 
            border-radius: 8px; 
            overflow-x: auto; 
            font-size: 14px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #4f46e5;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>API Response Data</h1>
        
        <div class="description">
            <p><strong>Description:</strong> This page fetches data from a public testing API (JSONPlaceholder). The data displayed below represents a "Post" object, which typically includes a unique User ID, a Post ID, a Title, and the Body content of the post.</p>
        </div>

        <h3>Raw JSON Data:</h3>
        <div id="api-data">Loading data...</div>
        
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        // Fetching data from a public API 
        fetch('https://jsonplaceholder.typicode.com/posts/1')
            .then(response => response.json())
            .then(data => {
                document.getElementById('api-data').innerHTML = 
                    `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            })
            .catch(error => {
                document.getElementById('api-data').innerHTML = 'Error loading data.';
                console.error('Error:', error);
            });
    </script>
</body>
</html>

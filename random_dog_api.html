<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Dog</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      color: #1e293b;
      margin-bottom: 12px;
    }

    p {
      color: #475569;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    #dog-image {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 20px;
      display: none;
    }

    #loading {
      color: #64748b;
      margin-top: 20px;
    }

    #error {
      color: #b91c1c;
      margin-top: 20px;
    }

    a {
      display: inline-block;
      margin-top: 24px;
      text-decoration: none;
      color: white;
      background: #4f46e5;
      padding: 10px 18px;
      border-radius: 10px;
    }

    a:hover {
      background: #4338ca;
    }
    #next-dog-button {
      margin-top: 20px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    #next-dog-button:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Random Dog</h1>

    <p>
      This page uses a public API that returns a random dog image.
    </p>

    <p>
      The displayed data represents an image URL generated by the API, and the page shows that image to the user.
    </p>

    <div id="loading">Loading dog image...</div>
    <div id="error"></div>
    <img id="dog-image" alt="Random dog image" />

    <button id="next-dog-button">Show Another Dog</button>
    <a href="index.html">Back to Home</a>
   
  </div>

  <script src="random_dog_api.js"></script>
</body>
</html>
